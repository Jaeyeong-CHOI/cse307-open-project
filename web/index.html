<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSE307 Python Web Shell</title>
  <style>
    body{margin:0;background:#0b1020;color:#e6ecff;font-family:ui-monospace,Menlo,monospace}
    .wrap{max-width:980px;margin:24px auto;padding:0 16px}
    .card{background:#121a33;border:1px solid #2a3b6b;border-radius:12px;padding:14px;margin-bottom:12px}
    h1{margin:0 0 8px;font-family:system-ui}
    textarea{width:100%;height:220px;background:#0a132b;color:#e6ecff;border:1px solid #334a86;border-radius:10px;padding:10px}
    button{background:#79a8ff;border:0;color:#09132f;font-weight:700;padding:10px 14px;border-radius:9px;cursor:pointer}
    pre{min-height:180px;background:#070f22;border:1px solid #2a3b6b;border-radius:10px;padding:10px;white-space:pre-wrap}
    .muted{color:#9db0dc;font-family:system-ui}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>🐍 CSE307 Python Web Shell</h1>
    <p class="muted">브라우저 내 Python 인터프리터(Pyodide)로 코드를 실행하고 결과를 출력합니다.</p>
  </div>

  <div class="card">
    <textarea id="code">print("hello cse307")
for i in range(3):
    print(i)
</textarea>
    <div style="margin-top:8px;display:flex;gap:8px;align-items:center;">
      <button id="runBtn">실행</button>
      <button id="clearBtn">출력 지우기</button>
      <span id="status" class="muted">Pyodide 로딩 중...</span>
    </div>
  </div>

  <div class="card">
    <pre id="output"></pre>
  </div>
</div>

<script type="module">
  import { loadPyodide } from "https://cdn.jsdelivr.net/pyodide/v0.27.2/full/pyodide.mjs";

  const outEl = document.getElementById('output');
  const statusEl = document.getElementById('status');
  const codeEl = document.getElementById('code');
  const runBtn = document.getElementById('runBtn');
  const clearBtn = document.getElementById('clearBtn');

  let pyodide = null;

  const append = (txt='') => { outEl.textContent += txt + "\n"; outEl.scrollTop = outEl.scrollHeight; };

  async function boot(){
    pyodide = await loadPyodide();
    statusEl.textContent = '준비 완료';
    runBtn.disabled = false;
  }

  runBtn.disabled = true;
  boot().catch(err => {
    statusEl.textContent = '로딩 실패';
    append('Pyodide load error: ' + err.message);
  });

  runBtn.addEventListener('click', async () => {
    if(!pyodide) return;
    const code = codeEl.value;
    append('>>> 실행 시작');
    statusEl.textContent = '실행 중...';
    try {
      let printed = [];
      pyodide.setStdout({ batched: (s) => printed.push(s) });
      pyodide.setStderr({ batched: (s) => printed.push('[stderr] ' + s) });
      const result = await pyodide.runPythonAsync(code);
      if (printed.length) append(printed.join('\n'));
      if (result !== undefined) append(String(result));
      append('>>> 실행 완료');
    } catch (e) {
      append('[error] ' + e.message);
    } finally {
      statusEl.textContent = '준비 완료';
    }
  });

  clearBtn.addEventListener('click', () => { outEl.textContent = ''; });
</script>
</body>
</html>
