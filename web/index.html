<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSE307 AI-FAIL-PL Python Shell</title>
  <style>
    :root{--bg:#f6f8fb;--card:#fff;--text:#191f28;--sub:#6b7684;--line:#e5e8eb;--p:#3182f6;--ok:#00a15f;--bad:#d14343}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif}
    .container{max-width:1180px;margin:0 auto;padding:28px 20px 50px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px}
    h1,h2{margin:0 0 10px}.muted{color:var(--sub)}
    .badge{display:inline-block;background:#e8f1ff;color:#1f6feb;padding:5px 10px;border-radius:999px;font-size:12px;font-weight:700;margin-bottom:8px}
    .grid{display:grid;grid-template-columns:1fr;gap:14px}@media(min-width:1080px){.grid{grid-template-columns:1fr 1fr}}
    input,textarea,button{font:inherit} input,textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px}
    textarea{min-height:260px;resize:vertical;font-family:ui-monospace,Menlo,Consolas,monospace}
    .label{display:block;font-size:13px;color:var(--sub);margin:8px 0 6px}
    .btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    button{border:0;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer}
    .pri{background:var(--p);color:#fff}.soft{background:#eef2f7;color:#334155}
    .status{margin-top:10px;padding:10px 12px;border-radius:10px;background:#f2f4f6;color:#4e5968;font-weight:700}
    .ok{background:#ecfff6;color:var(--ok)} .bad{background:#fff1f1;color:var(--bad)}
    .box{white-space:pre-wrap;background:#fafbfc;border:1px solid var(--line);border-radius:10px;padding:10px;min-height:120px}
    .result{background:#0f1724;color:#d9e3f0;min-height:240px;overflow:auto}
    .map-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}@media(max-width:760px){.map-grid{grid-template-columns:1fr}}
    .map-item{border:1px dashed #d9dee5;border-radius:12px;padding:10px}
    code{background:#eef2f7;padding:2px 5px;border-radius:6px}
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <span class="badge">CSE307 · AI-FAIL-PL</span>
    <h1>Python 문법 유지 + 키워드 별칭 변경</h1>
  </div>

  <div class="card">
    <h2>키워드 별칭 설정</h2>
    <div id="mapGrid" class="map-grid"></div>
    <div class="btns">
      <button class="soft" id="resetMapBtn">기본값 복원</button>
      <button class="soft" id="regenRandomBtn">랜덤 언어 재생성</button>
    </div>
    <label class="label" style="margin-top:10px;">
      <input type="checkbox" id="randomizeAliasChk" checked style="width:auto;margin-right:6px;vertical-align:middle;"> 입력 코드에서 별칭 토큰을 같은 길이의 랜덤 언어 토큰으로 변환
    </label>
    <p class="muted">별칭은 직접 원하는 값으로 설정하고, 실행 시 별칭 토큰만 랜덤 언어로 한 번 더 변환됩니다. 별칭에는 띄어쓰기가 포함되어도 됩니다.</p>
  </div>

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">
      <h2 style="margin:0;">언어 설명 + 문제 설명</h2>
      <button class="soft" id="copyPromptBtn" style="width:auto;">AI 프롬프트 복사</button>
    </div>
    <h2 style="margin-top:14px;">언어 설명</h2>
    <div id="langDesc" class="box"></div>
    <h2 style="margin-top:14px;">문제 설명 (조건)</h2>
    <div id="problemDesc" class="box"></div>
  </div>

  <div class="grid">
    <div class="card">
      <h2>AI-FAIL-PL 코드 입력</h2>
      <textarea id="codeInput">def fib(n):
    if n <= 1:
        return n
    return fib(n-1) + fib(n-2)

for i in range(7):
    print(i, fib(i))
</textarea>
      <div class="btns">
        <button class="pri" id="runBtn">실행</button>
        <button class="soft" id="clearBtn">출력 지우기</button>
      </div>
      <div id="status" class="status">Pyodide 로딩 중...</div>
    </div>

    <div class="card">
      <h2>변환된 Python 코드</h2>
      <div id="pyCodeView" class="box"></div>
      <h2 style="margin-top:14px">실행 결과</h2>
      <div id="resultView" class="box result"></div>
    </div>
  </div>
</div>

<script type="module">
  import { loadPyodide } from "https://cdn.jsdelivr.net/pyodide/v0.27.2/full/pyodide.mjs";

  const DEFAULT_ALIAS = {
    if: 'if',
    elif: 'elif',
    else: 'else',
    def: 'def',
    for: 'for',
    while: 'while',
    in: 'in',
    return: 'return',
    print: 'print',
    range: 'range'
  };

  let alias = JSON.parse(localStorage.getItem('aifailpl_alias') || 'null') || { ...DEFAULT_ALIAS };
  let pyodide = null;

  const mapGrid = document.getElementById('mapGrid');
  const codeInput = document.getElementById('codeInput');
  const pyCodeView = document.getElementById('pyCodeView');
  const resultView = document.getElementById('resultView');
  const statusEl = document.getElementById('status');
  const langDescEl = document.getElementById('langDesc');
  const problemDescEl = document.getElementById('problemDesc');
  const randomizeAliasChk = document.getElementById('randomizeAliasChk');
  const copyPromptBtn = document.getElementById('copyPromptBtn');

  function saveAlias(){ localStorage.setItem('aifailpl_alias', JSON.stringify(alias)); }

  function randomWord(len){
    const chars = 'abcdefghijklmnopqrstuvwxyz';
    let s = '';
    for(let i=0;i<len;i++) s += chars[Math.floor(Math.random()*chars.length)];
    return s;
  }

  function makeRandomAliasByLen(len){
    let cand = randomWord(len);
    const used = new Set([...Object.values(alias), ...Object.keys(DEFAULT_ALIAS)]);
    let guard = 0;
    while((used.has(cand)) && guard < 100){
      cand = randomWord(len);
      guard++;
    }
    return cand;
  }

  function renderAliasUI(){
    mapGrid.innerHTML = '';
    for (const pyKw of Object.keys(DEFAULT_ALIAS)){
      const div = document.createElement('div');
      div.className = 'map-item';
      div.innerHTML = `<label class="label">Python <code>${pyKw}</code> 별칭</label><input data-k="${pyKw}" value="${alias[pyKw] || pyKw}">`;
      mapGrid.appendChild(div);
    }
    mapGrid.querySelectorAll('input[data-k]').forEach(inp => {
      inp.addEventListener('input', (e) => {
        const k = e.target.dataset.k;
        const v = e.target.value.trim() || k;
        alias[k] = v;
        saveAlias();
        previewTransform();
        renderDescriptions();
      });
    });
  }

  function renderDescriptions(){
    const changed = Object.keys(DEFAULT_ALIAS).filter(k => (alias[k] || k) !== k);
    const mappingLines = changed.length
      ? changed.map(k => `${k} --> ${alias[k]}`).join('\n')
      : '기본 설정과 동일합니다. (별칭 변경 없음)';

    langDescEl.textContent =
`Python 문법은 그대로 유지합니다.
키워드 별칭은 사용자가 원하는 문자열(공백 포함)로 설정할 수 있습니다.
실행 시에는 입력 코드에서 별칭을 감지하고, 변경된 키워드는 원본 Python 키워드와 같은 글자수의 난수 토큰을 거친 뒤 Python 원본 키워드로 변환해 실행합니다.

현재 설정 요약:
${mappingLines}`;

    problemDescEl.textContent =
`[문제] 아래 동작을 만족하는 코드를 작성하시오.
1) fib(n) 함수를 정의하라.
2) n <= 1 이면 n을 반환하라.
3) 그 외에는 fib(n-1) + fib(n-2)를 반환하라.
4) for 반복문으로 i = 0..6까지 순회하며 print(i, fib(i))를 출력하라.`;
  }

  function escapeRegExp(s){ return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

  function isWordToken(s){
    return /^[A-Za-z_][A-Za-z0-9_]*$/.test(s);
  }

  function isWordChar(ch){
    return /[A-Za-z0-9_]/.test(ch || '');
  }

  function replaceChunk(chunk, tokenMap){
    const keys = Object.keys(tokenMap).sort((a,b) => b.length - a.length);
    let out = '';
    let i = 0;

    while (i < chunk.length){
      let matched = false;

      for (const k of keys){
        if (!k) continue;
        if (chunk.startsWith(k, i)){
          if (isWordToken(k)){
            const prev = chunk[i-1] || '';
            const next = chunk[i + k.length] || '';
            if (isWordChar(prev) || isWordChar(next)) {
              continue; // 식별자 내부 매칭 방지
            }
          }
          out += tokenMap[k];
          i += k.length;
          matched = true;
          break;
        }
      }

      if (!matched){
        out += chunk[i];
        i += 1;
      }
    }

    return out;
  }

  // 문자열/주석 밖에서만 치환 (별칭에 공백 포함 허용)
  function transformByMap(src, tokenMap){
    let out = '';
    let buf = '';
    let i = 0;
    let mode = 'normal'; // normal | s_quote | d_quote | comment

    const flush = () => {
      if (buf){ out += replaceChunk(buf, tokenMap); buf = ''; }
    };

    while (i < src.length){
      const ch = src[i];

      if (mode === 'normal'){
        if (ch === '#'){ flush(); mode = 'comment'; out += ch; i++; continue; }
        if (ch === "'"){ flush(); mode = 's_quote'; out += ch; i++; continue; }
        if (ch === '"'){ flush(); mode = 'd_quote'; out += ch; i++; continue; }
        buf += ch; i++; continue;
      }

      if (mode === 'comment'){
        out += ch;
        if (ch === '\n') mode = 'normal';
        i++; continue;
      }
      if (mode === 's_quote'){
        out += ch;
        if (ch === "'" && src[i-1] !== '\\') mode = 'normal';
        i++; continue;
      }
      if (mode === 'd_quote'){
        out += ch;
        if (ch === '"' && src[i-1] !== '\\') mode = 'normal';
        i++; continue;
      }
    }

    flush();
    return out;
  }

  function prepareCodes(src){
    const aliasToPy = {};
    for (const [pyKw, userWord] of Object.entries(alias)) aliasToPy[userWord] = pyKw;

    const changed = Object.keys(DEFAULT_ALIAS).filter(k => (alias[k] || k) !== k);
    const aliasToRand = {};
    const randToPy = {};

    if (randomizeAliasChk.checked){
      for (const pyKw of changed){
        const userWord = alias[pyKw];
        const rand = makeRandomAliasByLen(pyKw.length); // 원본 키워드 길이 기준

        // 사용자 별칭 토큰도 랜덤화
        aliasToRand[userWord] = rand;
        // 원본 Python 키워드를 그대로 쓴 경우도 랜덤화
        aliasToRand[pyKw] = rand;

        randToPy[rand] = pyKw;
      }
    }

    const randomCode = randomizeAliasChk.checked
      ? transformByMap(src, aliasToRand)
      : src;

    const pyCode = randomizeAliasChk.checked
      ? transformByMap(randomCode, randToPy)
      : transformByMap(src, aliasToPy);

    return { randomCode, pyCode, aliasToRand };
  }

  function previewTransform(){
    const prepared = prepareCodes(codeInput.value);
    pyCodeView.textContent =
`[STEP1: 랜덤 치환 코드]\n${prepared.randomCode}\n\n[STEP2: 최종 Python 코드]\n${prepared.pyCode}`;
  }

  document.getElementById('resetMapBtn').addEventListener('click', () => {
    alias = { ...DEFAULT_ALIAS };
    saveAlias();
    renderAliasUI();
    previewTransform();
    renderDescriptions();
  });

  document.getElementById('regenRandomBtn').addEventListener('click', () => {
    // 별칭은 유지하고, 랜덤 언어 변환 결과만 새로 생성
    previewTransform();
  });

  randomizeAliasChk.addEventListener('change', () => {
    renderDescriptions();
    previewTransform();
  });


  async function copyTextRobust(text){
    // 1) modern clipboard API (https/secure context)
    if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
      await navigator.clipboard.writeText(text);
      return;
    }
    // 2) fallback: hidden textarea + execCommand
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.setAttribute('readonly', '');
    ta.style.position = 'fixed';
    ta.style.top = '-1000px';
    ta.style.left = '-1000px';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    const ok = document.execCommand && document.execCommand('copy');
    document.body.removeChild(ta);
    if (!ok) throw new Error('브라우저가 복사 명령을 지원하지 않습니다.');
  }

  copyPromptBtn.addEventListener('click', async () => {
    const text = `[언어 설명]\n${langDescEl.textContent}\n\n[문제 설명]\n${problemDescEl.textContent}`;
    try {
      await copyTextRobust(text);
      const old = copyPromptBtn.textContent;
      copyPromptBtn.textContent = '복사 완료';
      setTimeout(() => copyPromptBtn.textContent = old, 1200);
    } catch (e) {
      resultView.textContent += '[copy-error] 클립보드 복사 실패: ' + e.message + '\n';
    }
  });

  document.getElementById('clearBtn').addEventListener('click', () => {
    resultView.textContent = '';
  });

  codeInput.addEventListener('input', previewTransform);

  document.getElementById('runBtn').addEventListener('click', async () => {
    if (!pyodide) return;

    const prepared = prepareCodes(codeInput.value);
    const pyCode = prepared.pyCode;
    pyCodeView.textContent =
`[STEP1: 랜덤 치환 코드]\n${prepared.randomCode}\n\n[STEP2: 최종 Python 코드]\n${prepared.pyCode}`;

    const randomMapText = Object.keys(prepared.aliasToRand || {}).length
      ? '[random-map] ' + JSON.stringify(prepared.aliasToRand)
      : '[random-map] {}';
    resultView.textContent += randomMapText + '\n';

    statusEl.className = 'status';
    statusEl.textContent = '실행 중...';

    try {
      const lines = [];
      pyodide.setStdout({ batched: (s) => lines.push(s) });
      pyodide.setStderr({ batched: (s) => lines.push('[stderr] ' + s) });
      const val = await pyodide.runPythonAsync(pyCode);
      if (lines.length) resultView.textContent += lines.join('\n') + '\n';
      if (val !== undefined) resultView.textContent += String(val) + '\n';
      statusEl.className = 'status ok';
      statusEl.textContent = '실행 완료';
    } catch (e) {
      resultView.textContent += '[error] ' + e.message + '\n';
      statusEl.className = 'status bad';
      statusEl.textContent = '실행 실패';
    }
  });

  renderAliasUI();
  previewTransform();
  renderDescriptions();

  try {
    pyodide = await loadPyodide();
    statusEl.className = 'status ok';
    statusEl.textContent = '준비 완료';
  } catch (e) {
    statusEl.className = 'status bad';
    statusEl.textContent = 'Pyodide 로딩 실패';
    resultView.textContent = String(e);
  }
</script>
</body>
</html>
