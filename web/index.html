<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSE307 프로젝트 리셋 메모</title>
  <style>
    body{margin:0;background:#0f1630;color:#eaf0ff;font-family:system-ui,sans-serif}
    .wrap{max-width:860px;margin:40px auto;padding:0 16px}
    .card{background:#152042;border:1px solid #2a3c70;border-radius:12px;padding:16px;margin:12px 0}
    h1,h2{margin:0 0 10px}
    li,p{color:#b8c6e8}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>CSE307 오픈 프로젝트 (리셋)</h1>
      <p>기존 핵심 아이디어를 잠정 제거하고, 목표/방법을 재설계 중입니다.</p>
    </div>
    <div class="card">
      <h2>새 목표</h2>
      <ul>
        <li>AI 시대에 맞는 실질 학습 평가 구조 설계</li>
        <li>운영 가능한 채점/검증 프로세스 구축</li>
        <li>학생 이해도 중심의 평가 지표 설계</li>
      </ul>
    </div>
    <div class="card">
      <h2>새 방법(가안)</h2>
      <ul>
        <li>제출물 평가 + 현장 수정 + 구두 검증 결합</li>
        <li>학생별 과제 변형</li>
        <li>실패 로그/설계 근거 제출</li>
      </ul>
    </div>
  </div>
</body>
</html>
