<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSE307 AI-FAIL-PL Python Shell</title>
  <style>
    :root{--bg:#f6f8fb;--card:#fff;--text:#191f28;--sub:#6b7684;--line:#e5e8eb;--p:#3182f6;--ok:#00a15f;--bad:#d14343}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif}
    .container{max-width:1180px;margin:0 auto;padding:28px 20px 50px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px}
    h1,h2{margin:0 0 10px}.muted{color:var(--sub)}
    .badge{display:inline-block;background:#e8f1ff;color:#1f6feb;padding:5px 10px;border-radius:999px;font-size:12px;font-weight:700;margin-bottom:8px}
    .grid{display:grid;grid-template-columns:1fr;gap:14px}@media(min-width:1080px){.grid{grid-template-columns:1fr 1fr}}
    input,textarea,button{font:inherit} input,textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px}
    textarea{min-height:260px;resize:vertical;font-family:ui-monospace,Menlo,Consolas,monospace}
    .label{display:block;font-size:13px;color:var(--sub);margin:8px 0 6px}
    .btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    button{border:0;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer}
    .pri{background:var(--p);color:#fff}.soft{background:#eef2f7;color:#334155}
    .status{margin-top:10px;padding:10px 12px;border-radius:10px;background:#f2f4f6;color:#4e5968;font-weight:700}
    .ok{background:#ecfff6;color:var(--ok)} .bad{background:#fff1f1;color:var(--bad)}
    .box{white-space:pre-wrap;background:#fafbfc;border:1px solid var(--line);border-radius:10px;padding:10px;min-height:120px}
    .result{background:#0f1724;color:#d9e3f0;min-height:240px;overflow:auto}
    .map-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}@media(max-width:760px){.map-grid{grid-template-columns:1fr}}
    .map-item{border:1px dashed #d9dee5;border-radius:12px;padding:10px}
    code{background:#eef2f7;padding:2px 5px;border-radius:6px}
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <span class="badge">CSE307 · AI-FAIL-PL</span>
    <h1>Python 문법 유지 + 키워드 별칭 변경</h1>
    <p class="muted">요청대로 <b>Python 문법은 그대로</b> 유지하고, <code>if</code>/<code>def</code>/<code>for</code> 같은 키워드 이름만 네가 원하는 별칭으로 바꿔 쓸 수 있게 구성했어.</p>
    <p class="muted">실행 전에 별칭 코드를 실제 Python 코드로 치환한 뒤 Pyodide 인터프리터로 실행한다.</p>
  </div>

  <div class="card">
    <h2>키워드 별칭 설정</h2>
    <div id="mapGrid" class="map-grid"></div>
    <div class="btns">
      <button class="soft" id="resetMapBtn">기본값 복원</button>
    </div>
    <p class="muted">예: <code>if</code>의 별칭을 <code>만약</code>으로 바꾸면, 코드에서 <code>만약 x &gt; 0:</code> 형태로 작성 가능.</p>
  </div>

  <div class="grid">
    <div class="card">
      <h2>AI-FAIL-PL 코드 입력</h2>
      <textarea id="codeInput">def fib(n):
    if n <= 1:
        return n
    return fib(n-1) + fib(n-2)

for i in range(7):
    print(i, fib(i))
</textarea>
      <div class="btns">
        <button class="pri" id="runBtn">실행</button>
        <button class="soft" id="clearBtn">출력 지우기</button>
      </div>
      <div id="status" class="status">Pyodide 로딩 중...</div>
    </div>

    <div class="card">
      <h2>변환된 Python 코드</h2>
      <div id="pyCodeView" class="box"></div>
      <h2 style="margin-top:14px">실행 결과</h2>
      <div id="resultView" class="box result"></div>
    </div>
  </div>
</div>

<script type="module">
  import { loadPyodide } from "https://cdn.jsdelivr.net/pyodide/v0.27.2/full/pyodide.mjs";

  const DEFAULT_ALIAS = {
    if: 'if',
    elif: 'elif',
    else: 'else',
    def: 'def',
    for: 'for',
    while: 'while',
    in: 'in',
    return: 'return',
    print: 'print',
    range: 'range'
  };

  let alias = JSON.parse(localStorage.getItem('aifailpl_alias') || 'null') || { ...DEFAULT_ALIAS };
  let pyodide = null;

  const mapGrid = document.getElementById('mapGrid');
  const codeInput = document.getElementById('codeInput');
  const pyCodeView = document.getElementById('pyCodeView');
  const resultView = document.getElementById('resultView');
  const statusEl = document.getElementById('status');

  function saveAlias(){ localStorage.setItem('aifailpl_alias', JSON.stringify(alias)); }

  function renderAliasUI(){
    mapGrid.innerHTML = '';
    for (const pyKw of Object.keys(DEFAULT_ALIAS)){
      const div = document.createElement('div');
      div.className = 'map-item';
      div.innerHTML = `<label class="label">Python <code>${pyKw}</code> 별칭</label><input data-k="${pyKw}" value="${alias[pyKw] || pyKw}">`;
      mapGrid.appendChild(div);
    }
    mapGrid.querySelectorAll('input[data-k]').forEach(inp => {
      inp.addEventListener('input', (e) => {
        const k = e.target.dataset.k;
        alias[k] = e.target.value.trim() || k;
        saveAlias();
        previewTransform();
      });
    });
  }

  function isWordChar(ch){ return /[A-Za-z0-9_가-힣]/.test(ch); }

  // 문자열/주석 밖에서만 식별자 치환
  function transformToPython(src){
    const reverse = {};
    for (const [pyKw, userWord] of Object.entries(alias)) reverse[userWord] = pyKw;

    let out = '';
    let i = 0;
    let mode = 'normal'; // normal | s_quote | d_quote | comment

    while (i < src.length){
      const ch = src[i];

      if (mode === 'comment'){
        out += ch;
        if (ch === '\n') mode = 'normal';
        i++; continue;
      }
      if (mode === 's_quote'){
        out += ch;
        if (ch === "'" && src[i-1] !== '\\') mode = 'normal';
        i++; continue;
      }
      if (mode === 'd_quote'){
        out += ch;
        if (ch === '"' && src[i-1] !== '\\') mode = 'normal';
        i++; continue;
      }

      if (ch === '#'){ mode = 'comment'; out += ch; i++; continue; }
      if (ch === "'"){ mode = 's_quote'; out += ch; i++; continue; }
      if (ch === '"'){ mode = 'd_quote'; out += ch; i++; continue; }

      if (isWordChar(ch)){
        let j = i;
        while (j < src.length && isWordChar(src[j])) j++;
        const token = src.slice(i, j);
        out += (reverse[token] || token);
        i = j;
      } else {
        out += ch;
        i++;
      }
    }
    return out;
  }

  function previewTransform(){
    pyCodeView.textContent = transformToPython(codeInput.value);
  }

  document.getElementById('resetMapBtn').addEventListener('click', () => {
    alias = { ...DEFAULT_ALIAS };
    saveAlias();
    renderAliasUI();
    previewTransform();
  });

  document.getElementById('clearBtn').addEventListener('click', () => {
    resultView.textContent = '';
  });

  codeInput.addEventListener('input', previewTransform);

  document.getElementById('runBtn').addEventListener('click', async () => {
    if (!pyodide) return;
    const pyCode = transformToPython(codeInput.value);
    pyCodeView.textContent = pyCode;

    statusEl.className = 'status';
    statusEl.textContent = '실행 중...';

    try {
      const lines = [];
      pyodide.setStdout({ batched: (s) => lines.push(s) });
      pyodide.setStderr({ batched: (s) => lines.push('[stderr] ' + s) });
      const val = await pyodide.runPythonAsync(pyCode);
      if (lines.length) resultView.textContent += lines.join('\n') + '\n';
      if (val !== undefined) resultView.textContent += String(val) + '\n';
      statusEl.className = 'status ok';
      statusEl.textContent = '실행 완료';
    } catch (e) {
      resultView.textContent += '[error] ' + e.message + '\n';
      statusEl.className = 'status bad';
      statusEl.textContent = '실행 실패';
    }
  });

  renderAliasUI();
  previewTransform();

  try {
    pyodide = await loadPyodide();
    statusEl.className = 'status ok';
    statusEl.textContent = '준비 완료';
  } catch (e) {
    statusEl.className = 'status bad';
    statusEl.textContent = 'Pyodide 로딩 실패';
    resultView.textContent = String(e);
  }
</script>
</body>
</html>
