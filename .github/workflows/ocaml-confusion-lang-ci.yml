name: OCaml confusion-lang CI

on:
  push:
    paths:
      - "ocaml-confusion-lang/**"
      - ".github/workflows/ocaml-confusion-lang-ci.yml"
  pull_request:
    paths:
      - "ocaml-confusion-lang/**"
      - ".github/workflows/ocaml-confusion-lang-ci.yml"
  workflow_dispatch:
    inputs:
      ci_mode:
        description: "CI execution mode"
        required: false
        default: auto
        type: choice
        options:
          - auto
          - lightweight
          - full
      snapshot_top_k_mismatches:
        description: "Top-K mismatch hints in step summary (1-3 or auto, default: 1)"
        required: false
        default: "1"
        type: choice
        options:
          - "1"
          - "2"
          - "3"
          - auto
      summary_event_name_mode:
        description: "Summary run_context event_name policy (permissive=strict off, strict=require explicit --event-name)"
        required: false
        default: permissive
        type: choice
        options:
          - permissive
          - strict
      snapshot_event_name_mode:
        description: "Snapshot run_context event_name policy (permissive=fallback unknown allowed, strict=require explicit --event-name)"
        required: false
        default: permissive
        type: choice
        options:
          - permissive
          - strict
      metric_event_name_mode:
        description: "Metric run_context event_name policy (permissive=fallback unknown allowed, strict=require explicit event_name)"
        required: false
        default: permissive
        type: choice
        options:
          - permissive
          - strict

concurrency:
  group: ocaml-confusion-lang-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      full_ci: ${{ steps.resolve-mode.outputs.full_ci }}
      manual_mode: ${{ steps.resolve-mode.outputs.manual_mode }}
      detected_full_ci: ${{ steps.resolve-mode.outputs.detected_full_ci }}
      snapshot_top_k_mismatches: ${{ steps.resolve-mode.outputs.snapshot_top_k_mismatches }}
      summary_require_explicit_event_name: ${{ steps.resolve-mode.outputs.summary_require_explicit_event_name }}
      snapshot_require_explicit_event_name: ${{ steps.resolve-mode.outputs.snapshot_require_explicit_event_name }}
      metric_require_explicit_event_name: ${{ steps.resolve-mode.outputs.metric_require_explicit_event_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate event_name against shared run_context schema
        run: |
          python3 ocaml-confusion-lang/scripts/validate_run_context_event_name.py "${{ github.event_name }}"

      - name: Detect OCaml-engine changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            full_ci:
              - '.github/workflows/ocaml-confusion-lang-ci.yml'
              - 'ocaml-confusion-lang/dune-project'
              - 'ocaml-confusion-lang/**/dune'
              - 'ocaml-confusion-lang/bin/**'
              - 'ocaml-confusion-lang/**/*.ml'
              - 'ocaml-confusion-lang/**/*.mli'
              # OCaml smoke 입력(별칭/manifest/source fixture) 변경도 full 경로로 승격
              - 'ocaml-confusion-lang/examples/**/*.tsv'
              - 'ocaml-confusion-lang/examples/**/*.txt'
              - 'ocaml-confusion-lang/examples/**/*.py'

      - name: Resolve CI mode (auto/lightweight/full)
        id: resolve-mode
        shell: bash
        env:
          FILTER_FULL_CI: ${{ steps.filter.outputs.full_ci }}
          MANUAL_MODE: ${{ github.event.inputs.ci_mode || 'auto' }}
          MANUAL_SNAPSHOT_TOP_K: ${{ github.event.inputs.snapshot_top_k_mismatches || '1' }}
          MANUAL_SUMMARY_EVENT_NAME_MODE: ${{ github.event.inputs.summary_event_name_mode || 'permissive' }}
          MANUAL_SNAPSHOT_EVENT_NAME_MODE: ${{ github.event.inputs.snapshot_event_name_mode || 'permissive' }}
          MANUAL_METRIC_EVENT_NAME_MODE: ${{ github.event.inputs.metric_event_name_mode || 'permissive' }}
        run: |
          set -euo pipefail
          if [[ "${MANUAL_MODE}" == "full" ]]; then
            full_ci=true
          elif [[ "${MANUAL_MODE}" == "lightweight" ]]; then
            full_ci=false
          else
            full_ci="${FILTER_FULL_CI}"
          fi

          snapshot_top_k="${MANUAL_SNAPSHOT_TOP_K}"
          if ! [[ "${snapshot_top_k}" =~ ^([1-3]|auto)$ ]]; then
            echo "Invalid snapshot_top_k_mismatches='${snapshot_top_k}', fallback to 1"
            snapshot_top_k=1
          fi

          mode_resolution=$(python3 ocaml-confusion-lang/scripts/resolve_event_name_modes.py \
            --summary-mode "${MANUAL_SUMMARY_EVENT_NAME_MODE}" \
            --snapshot-mode "${MANUAL_SNAPSHOT_EVENT_NAME_MODE}" \
            --metric-mode "${MANUAL_METRIC_EVENT_NAME_MODE}")
          echo "${mode_resolution}" | grep '^Invalid ' || true

          summary_event_name_mode=$(echo "${mode_resolution}" | grep '^summary_mode=' | cut -d= -f2)
          summary_require_explicit_event_name=$(echo "${mode_resolution}" | grep '^summary_require_explicit_event_name=' | cut -d= -f2)
          snapshot_event_name_mode=$(echo "${mode_resolution}" | grep '^snapshot_mode=' | cut -d= -f2)
          snapshot_require_explicit_event_name=$(echo "${mode_resolution}" | grep '^snapshot_require_explicit_event_name=' | cut -d= -f2)
          metric_event_name_mode=$(echo "${mode_resolution}" | grep '^metric_mode=' | cut -d= -f2)
          metric_require_explicit_event_name=$(echo "${mode_resolution}" | grep '^metric_require_explicit_event_name=' | cut -d= -f2)

          echo "full_ci=${full_ci}" >> "$GITHUB_OUTPUT"
          echo "manual_mode=${MANUAL_MODE}" >> "$GITHUB_OUTPUT"
          echo "detected_full_ci=${FILTER_FULL_CI}" >> "$GITHUB_OUTPUT"
          echo "snapshot_top_k_mismatches=${snapshot_top_k}" >> "$GITHUB_OUTPUT"
          echo "summary_require_explicit_event_name=${summary_require_explicit_event_name}" >> "$GITHUB_OUTPUT"
          echo "snapshot_require_explicit_event_name=${snapshot_require_explicit_event_name}" >> "$GITHUB_OUTPUT"
          echo "metric_require_explicit_event_name=${metric_require_explicit_event_name}" >> "$GITHUB_OUTPUT"
          echo "Resolved full_ci=${full_ci} (manual=${MANUAL_MODE}, detected=${FILTER_FULL_CI}, top_k=${snapshot_top_k}, summary_event_name_mode=${summary_event_name_mode}, snapshot_event_name_mode=${snapshot_event_name_mode}, metric_event_name_mode=${metric_event_name_mode})"

      - name: Publish CI mode decision summary
        shell: bash
        env:
          RESOLVED_FULL_CI: ${{ steps.resolve-mode.outputs.full_ci }}
          MANUAL_MODE: ${{ steps.resolve-mode.outputs.manual_mode }}
          DETECTED_FULL_CI: ${{ steps.resolve-mode.outputs.detected_full_ci }}
          SNAPSHOT_TOP_K: ${{ steps.resolve-mode.outputs.snapshot_top_k_mismatches }}
          SUMMARY_REQUIRE_EXPLICIT_EVENT_NAME: ${{ steps.resolve-mode.outputs.summary_require_explicit_event_name }}
          SNAPSHOT_REQUIRE_EXPLICIT_EVENT_NAME: ${{ steps.resolve-mode.outputs.snapshot_require_explicit_event_name }}
          METRIC_REQUIRE_EXPLICIT_EVENT_NAME: ${{ steps.resolve-mode.outputs.metric_require_explicit_event_name }}
        run: |
          {
            echo "## CI mode resolution"
            echo "- manual_mode: ${MANUAL_MODE}"
            echo "- detected_full_ci: ${DETECTED_FULL_CI}"
            echo "- resolved_full_ci: ${RESOLVED_FULL_CI}"
            echo "- snapshot_top_k_mismatches: ${SNAPSHOT_TOP_K}"
            python3 ocaml-confusion-lang/scripts/format_event_name_policy_modes.py \
              --summary "${SUMMARY_REQUIRE_EXPLICIT_EVENT_NAME}" \
              --snapshot "${SNAPSHOT_REQUIRE_EXPLICIT_EVENT_NAME}" \
              --metric "${METRIC_REQUIRE_EXPLICIT_EVENT_NAME}"
          } >> "$GITHUB_STEP_SUMMARY"

  test-lightweight:
    needs: detect-changes
    if: needs.detect-changes.outputs.full_ci != 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ocaml-confusion-lang
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Python schema/unit tests (lightweight)
        run: ./scripts/run_python_regression_tests.sh

      - name: Validate taxonomy/summary/metric/task-set schemas (smoke)
        run: |
          python3 scripts/validate_taxonomy_profiles.py
          python3 scripts/validate_metric_schema.py examples/metric-schema-v1.json
          python3 scripts/validate_task_set.py examples/task-set-v1.json

      - name: Summarize fixture + validate summary schema
        shell: bash
        env:
          SUMMARY_REQUIRE_EXPLICIT_EVENT_NAME: ${{ needs.detect-changes.outputs.summary_require_explicit_event_name }}
        run: |
          set -euo pipefail
          mkdir -p ../docs/research/results
          summary_args=()
          if [[ "${SUMMARY_REQUIRE_EXPLICIT_EVENT_NAME}" == "true" ]]; then
            summary_args+=(--require-explicit-event-name)
          fi
          python3 scripts/batch_report_summary.py \
            examples/batch-summary-fixture-whitespace-linecount.json \
            -o ../docs/research/results/roundtrip-batch-v1.fixture.summary.ci.md \
            --csv-output ../docs/research/results/roundtrip-batch-v1.fixture.summary.ci.csv \
            --json-output ../docs/research/results/roundtrip-batch-v1.fixture.summary.ci.json \
            --task-set-json examples/task-set-v1.json \
            --include-diff-columns \
            --mismatch-sort severity \
            "${summary_args[@]}"
          python3 scripts/validate_summary_payload.py \
            ../docs/research/results/roundtrip-batch-v1.fixture.summary.ci.json

      - name: Generate metric snapshot from fixture summary + validate
        shell: bash
        env:
          METRIC_REQUIRE_EXPLICIT_EVENT_NAME: ${{ needs.detect-changes.outputs.metric_require_explicit_event_name }}
        run: |
          set -euo pipefail
          metric_args=()
          if [[ "${METRIC_REQUIRE_EXPLICIT_EVENT_NAME}" == "true" ]]; then
            metric_args+=(--require-explicit-event-name)
          fi
          python3 scripts/generate_metric_snapshot.py \
            ../docs/research/results/roundtrip-batch-v1.fixture.summary.ci.json \
            -o ../docs/research/results/roundtrip-batch-v1.fixture.metrics.ci.json \
            --task-set-id fixture-task-set-v1 \
            --prompt-condition strict \
            --model gpt-5.3-codex \
            --task-set-json examples/task-set-fixture-whitespace-linecount-v1.json \
            --lineage-consistency fail \
            "${metric_args[@]}"
          python3 scripts/validate_metric_schema.py \
            ../docs/research/results/roundtrip-batch-v1.fixture.metrics.ci.json

      - name: Publish lightweight result snapshot (step summary)
        shell: bash
        env:
          SNAPSHOT_REQUIRE_EXPLICIT_EVENT_NAME: ${{ needs.detect-changes.outputs.snapshot_require_explicit_event_name }}
        run: |
          set -euo pipefail
          snapshot_args=()
          if [[ "${SNAPSHOT_REQUIRE_EXPLICIT_EVENT_NAME}" == "true" ]]; then
            snapshot_args+=(--require-explicit-event-name)
          fi
          python3 scripts/emit_ci_result_snapshot.py \
            ../docs/research/results/roundtrip-batch-v1.fixture.summary.ci.json \
            --metric-json ../docs/research/results/roundtrip-batch-v1.fixture.metrics.ci.json \
            --json-output ../docs/research/results/roundtrip-batch-v1.fixture.snapshot.ci.json \
            --label "Lightweight CI result snapshot" \
            --top-k-mismatches "${{ needs.detect-changes.outputs.snapshot_top_k_mismatches }}" \
            --run-id "${{ github.run_id }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --run-attempt "${{ github.run_attempt }}" \
            --event-name "${{ github.event_name }}" \
            --sha "${{ github.sha }}" \
            --ref "${{ github.ref }}" \
            --repository "${{ github.repository }}" \
            --actor "${{ github.actor }}" \
            --workflow "${{ github.workflow }}" \
            --job "${{ github.job }}" \
            "${snapshot_args[@]}" >> "$GITHUB_STEP_SUMMARY"
          python3 scripts/validate_ci_result_snapshot.py \
            ../docs/research/results/roundtrip-batch-v1.fixture.snapshot.ci.json

      - name: Upload lightweight CI artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: ocaml-confusion-lang-ci-results-lightweight
          path: |
            docs/research/results/roundtrip-batch-v1.fixture.summary.ci.md
            docs/research/results/roundtrip-batch-v1.fixture.summary.ci.csv
            docs/research/results/roundtrip-batch-v1.fixture.summary.ci.json
            docs/research/results/roundtrip-batch-v1.fixture.metrics.ci.json
            docs/research/results/roundtrip-batch-v1.fixture.snapshot.ci.json
          if-no-files-found: error

  test-full:
    needs: detect-changes
    if: needs.detect-changes.outputs.full_ci == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ocaml-confusion-lang
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.1.1

      - name: Install dependencies
        run: |
          opam install dune -y
          opam install . --deps-only --with-test -y

      - name: Build OCaml executable
        run: opam exec -- dune build bin/main.exe

      - name: Run Python schema/unit tests (single pass)
        run: ./scripts/run_python_regression_tests.sh

      - name: Smoke roundtrip-report output
        run: |
          mkdir -p ../docs/research/results
          opam exec -- dune exec ./bin/main.exe -- \
            roundtrip-report examples/case-c2.tsv examples/sample.py \
            ../docs/research/results/roundtrip-sample.ci.json

      - name: Smoke batch-roundtrip-report output
        run: |
          opam exec -- dune exec ./bin/main.exe -- \
            batch-roundtrip-report examples/case-c2.tsv examples/manifest-v1.txt \
            ../docs/research/results/roundtrip-batch-v1.ci.json

      - name: Smoke batch-roundtrip-report output (--include-diff)
        run: |
          opam exec -- dune exec ./bin/main.exe -- \
            batch-roundtrip-report examples/case-c2.tsv examples/manifest-v1.txt \
            ../docs/research/results/roundtrip-batch-v1.include-diff.ci.json --include-diff

      - name: Summarize batch report to markdown/csv/json (severity-first + task-set lineage)
        shell: bash
        env:
          SUMMARY_REQUIRE_EXPLICIT_EVENT_NAME: ${{ needs.detect-changes.outputs.summary_require_explicit_event_name }}
        run: |
          set -euo pipefail
          summary_args=()
          if [[ "${SUMMARY_REQUIRE_EXPLICIT_EVENT_NAME}" == "true" ]]; then
            summary_args+=(--require-explicit-event-name)
          fi
          python3 scripts/batch_report_summary.py \
            ../docs/research/results/roundtrip-batch-v1.include-diff.ci.json \
            -o ../docs/research/results/roundtrip-batch-v1.include-diff.summary.ci.md \
            --csv-output ../docs/research/results/roundtrip-batch-v1.include-diff.summary.ci.csv \
            --json-output ../docs/research/results/roundtrip-batch-v1.include-diff.summary.ci.json \
            --task-set-json examples/task-set-v1.json \
            --include-diff-columns \
            --mismatch-sort severity \
            "${summary_args[@]}"

      - name: Validate taxonomy weight profile schema
        run: python3 scripts/validate_taxonomy_profiles.py

      - name: Validate summary payload schema
        run: |
          python3 scripts/validate_summary_payload.py \
            ../docs/research/results/roundtrip-batch-v1.include-diff.summary.ci.json

      - name: Validate metric schema (smoke)
        run: python3 scripts/validate_metric_schema.py examples/metric-schema-v1.json

      - name: Validate task-set schema (smoke)
        run: python3 scripts/validate_task_set.py examples/task-set-v1.json

      - name: Generate metric snapshot from summary JSON + validate (lineage fail-fast)
        shell: bash
        env:
          METRIC_REQUIRE_EXPLICIT_EVENT_NAME: ${{ needs.detect-changes.outputs.metric_require_explicit_event_name }}
        run: |
          set -euo pipefail
          metric_args=()
          if [[ "${METRIC_REQUIRE_EXPLICIT_EVENT_NAME}" == "true" ]]; then
            metric_args+=(--require-explicit-event-name)
          fi
          python3 scripts/generate_metric_snapshot.py \
            ../docs/research/results/roundtrip-batch-v1.include-diff.summary.ci.json \
            -o ../docs/research/results/roundtrip-batch-v1.include-diff.metrics.ci.json \
            --task-set-id cse307-task-set-v1 \
            --prompt-condition strict \
            --model gpt-5.3-codex \
            --task-set-json examples/task-set-v1.json \
            --lineage-consistency fail \
            "${metric_args[@]}"
          python3 scripts/validate_metric_schema.py \
            ../docs/research/results/roundtrip-batch-v1.include-diff.metrics.ci.json

      - name: Publish full CI result snapshot (step summary)
        shell: bash
        env:
          SNAPSHOT_REQUIRE_EXPLICIT_EVENT_NAME: ${{ needs.detect-changes.outputs.snapshot_require_explicit_event_name }}
        run: |
          set -euo pipefail
          snapshot_args=()
          if [[ "${SNAPSHOT_REQUIRE_EXPLICIT_EVENT_NAME}" == "true" ]]; then
            snapshot_args+=(--require-explicit-event-name)
          fi
          python3 scripts/emit_ci_result_snapshot.py \
            ../docs/research/results/roundtrip-batch-v1.include-diff.summary.ci.json \
            --metric-json ../docs/research/results/roundtrip-batch-v1.include-diff.metrics.ci.json \
            --json-output ../docs/research/results/roundtrip-batch-v1.include-diff.snapshot.ci.json \
            --label "Full CI result snapshot" \
            --top-k-mismatches "${{ needs.detect-changes.outputs.snapshot_top_k_mismatches }}" \
            --run-id "${{ github.run_id }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --run-attempt "${{ github.run_attempt }}" \
            --event-name "${{ github.event_name }}" \
            --sha "${{ github.sha }}" \
            --ref "${{ github.ref }}" \
            --repository "${{ github.repository }}" \
            --actor "${{ github.actor }}" \
            --workflow "${{ github.workflow }}" \
            --job "${{ github.job }}" \
            "${snapshot_args[@]}" >> "$GITHUB_STEP_SUMMARY"
          python3 scripts/validate_ci_result_snapshot.py \
            ../docs/research/results/roundtrip-batch-v1.include-diff.snapshot.ci.json

      - name: Upload CI smoke artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: ocaml-confusion-lang-ci-results
          path: |
            docs/research/results/roundtrip-sample.ci.json
            docs/research/results/roundtrip-batch-v1.ci.json
            docs/research/results/roundtrip-batch-v1.include-diff.ci.json
            docs/research/results/roundtrip-batch-v1.include-diff.summary.ci.md
            docs/research/results/roundtrip-batch-v1.include-diff.summary.ci.csv
            docs/research/results/roundtrip-batch-v1.include-diff.summary.ci.json
            docs/research/results/roundtrip-batch-v1.include-diff.metrics.ci.json
            docs/research/results/roundtrip-batch-v1.include-diff.snapshot.ci.json
          if-no-files-found: error
